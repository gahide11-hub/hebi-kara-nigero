<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- タイトル画面 -->
    <div id="titleScreen">
        <h1>🐍 Snake Studio</h1>
        <p>森に迷い込んだ… 家に帰るため森を抜けよう！</p>
        <button onclick="startGame()">▶ はじめる</button>
    </div>

    <!-- ゲーム画面 -->
    <div id="gameScreen" style="display:none;">
        <h2>
            🌲 STAGE <span id="stageText">1</span>
            <span id="keyDisplay" style="margin-left: 20px; font-size: 0.8em; color: #aaa;"></span>
        </h2>

        <!-- ゲーム盤面 -->
        <div id="game"></div>

        <!-- 十字キー操作ボタン -->
        <div id="controls">
            <button onclick="movePlayer('up')" class="btn-up">⬆️</button>
            <button onclick="movePlayer('left')" class="btn-left">⬅️</button>
            <button onclick="movePlayer('down')" class="btn-down">⬇️</button>
            <button onclick="movePlayer('right')" class="btn-right">➡️</button>
        </div>

        <!-- 次ステージボタン -->
        <div id="nextStage" style="display:none;">
            <p>🎉 STAGE CLEAR!</p>
            <button onclick="nextStage()">次のステージへ</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
