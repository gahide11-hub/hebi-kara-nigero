<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Snake Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- タイトル画面 -->
    <div id="titleScreen">
        <h1>🐍 Snake Studio</h1>
        <p>森に迷い込んだ… 家に帰るため森を抜けよう！</p>
        <button onclick="startGame()">▶ はじめる</button>
    </div>

    <!-- ゲーム画面 -->
    <div id="gameScreen" style="display:none;">
        <h2>
            🌲 STAGE <span id="stageText">1</span>
            <span id="keyDisplay" style="margin-left: 20px; font-size: 0.8em; color: #aaa;"></span>
        </h2>

        <div id="game"></div>

        <!-- 十字キー配置の操作ボタン -->
        <div id="controls">
            <div class="row">
                <button onclick="movePlayer('up')">⬆️</button>
            </div>
            <div class="row">
                <button onclick="movePlayer('left')">⬅️</button>
                <button onclick="movePlayer('down')">⬇️</button>
                <button onclick="movePlayer('right')">➡️</button>
            </div>
        </div>

        <!-- 次ステージボタン -->
        <div id="nextStage" style="display:none;">
            <p>🎉 STAGE CLEAR!</p>
            <button onclick="nextStage()">次のステージへ</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
